networks:
  storage_service:
  repo_rangler_proxy:
    name: repo_rangler_proxy
    external: true

services:
  storage_service_nginx:
    container_name: reporangler_storage_service_nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    networks:
      - repo_rangler_proxy
      - storage_service
    volumes:
      - ./public:/www/public:ro
    environment:
      - VIRTUAL_HOST=storage.reporangler.localhost
    depends_on:
      - storage_service_phpfpm

  storage_service_phpfpm:
    container_name: reporangler_storage_service_phpfpm
    build:
      context: .
      dockerfile: docker/phpfpm/Dockerfile
    networks:
      - storage_service
    volumes:
      - .:/www
      - ../lib-reporangler:/lib-reporangler:ro
    env_file:
      - .env
